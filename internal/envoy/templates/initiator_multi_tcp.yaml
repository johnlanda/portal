# Portal initiator (source cluster) Envoy bootstrap — multi-service TCP proxy mode.
# One listener per service, each with its own upstream cluster and SNI value.
# All clusters point to the same responder endpoint but use different SNI for routing.
admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: {{.AdminPort}}

static_resources:
  listeners:
{{- range .Services}}
    - name: svc_{{.Name}}
      address:
        socket_address:
          address: {{.ListenAddress}}
          port_value: {{.ListenPort}}
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: svc_{{.Name}}
                cluster: tunnel_to_{{.Name}}
{{- end}}

  clusters:
{{- range .Services}}
    - name: tunnel_to_{{.Name}}
      connect_timeout: 30s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: tunnel_to_{{.Name}}
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: {{$.ResponderHost}}
                      port_value: {{$.ResponderPort}}
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: {{.SNI}}
          common_tls_context:
            tls_params:
              tls_minimum_protocol_version: TLSv1_3
              tls_maximum_protocol_version: TLSv1_3
            tls_certificates:
              - certificate_chain:
                  filename: {{$.CertPath}}/tls.crt
                private_key:
                  filename: {{$.CertPath}}/tls.key
            validation_context:
              trusted_ca:
                filename: {{$.CertPath}}/ca.crt
            alpn_protocols:
              - h2
{{- end}}
