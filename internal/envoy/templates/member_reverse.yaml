# Portal member (egress-only cluster) Envoy bootstrap — reverse tunnel mode.
# The member dials out to the hub and maintains N persistent reverse
# connections. Hub-originated requests arrive over those cached connections
# and are routed to published local services by canonical authority
# (<service>.<member>). Optional forward listeners proxy local apps' outbound
# calls to hub-side services over the v1 SNI tunnel path.
admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: {{.AdminPort}}

bootstrap_extensions:
  - name: envoy.bootstrap.reverse_tunnel.downstream_socket_interface
    typed_config:
      "@type": type.googleapis.com/envoy.extensions.bootstrap.reverse_tunnel.downstream_socket_interface.v3.DownstreamReverseConnectionSocketInterface
      stat_prefix: portal_member

static_resources:
  listeners:
    # The rc:// address encodes identity (node:cluster:tenant) and the number
    # of reverse connections to maintain toward the "hub" cluster.
    - name: reverse_tunnel
      listener_filters_timeout: 0s
      listener_filters: []
      address:
        socket_address:
          address: "rc://{{.NodeID}}:{{.MemberName}}:{{.HubName}}@hub:{{.ConnectionCount}}"
          port_value: 0
          resolver_name: envoy.resolvers.reverse_connection
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: reverse_tunnel
                strip_any_host_port: true
                route_config:
                  name: published
{{- if .Published}}
                  virtual_hosts:
{{- range .Published}}
                    - name: published_{{.Name}}
                      domains:
                        - "{{.Name}}.{{$.MemberName}}"
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: local_{{.Name}}
{{- end}}
{{- else}}
                  virtual_hosts: []
{{- end}}
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router
{{- range .Forward}}
    - name: fwd_{{.Name}}
      address:
        socket_address:
          address: {{.ListenAddress}}
          port_value: {{.ListenPort}}
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: fwd_{{.Name}}
                cluster: tunnel_to_{{.Name}}
{{- end}}

  clusters:
    # The hub tunnel endpoint. Reverse connections are established over mTLS;
    # the handshake SNI selects the hub's reverse-tunnel filter chain.
    - name: hub
      type: STRICT_DNS
      connect_timeout: 30s
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: hub
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: {{.HubHost}}
                      port_value: {{.HubPort}}
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: {{.HandshakeSNI}}
          common_tls_context:
            tls_params:
              tls_minimum_protocol_version: TLSv1_3
              tls_maximum_protocol_version: TLSv1_3
            tls_certificate_sds_secret_configs:
              - name: portal_tls
            validation_context_sds_secret_config:
              name: portal_ca
            alpn_protocols:
              - h2
              - http/1.1
{{- range .Published}}
    - name: local_{{.Name}}
      type: STRICT_DNS
      connect_timeout: 5s
      lb_policy: ROUND_ROBIN
{{- if eq .Protocol "grpc"}}
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
{{- end}}
      load_assignment:
        cluster_name: local_{{.Name}}
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: {{.BackendHost}}
                      port_value: {{.BackendPort}}
{{- end}}
{{- range .Forward}}
    - name: tunnel_to_{{.Name}}
      type: STRICT_DNS
      connect_timeout: 30s
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: tunnel_to_{{.Name}}
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: {{$.HubHost}}
                      port_value: {{$.HubPort}}
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: {{.SNI}}
          common_tls_context:
            tls_params:
              tls_minimum_protocol_version: TLSv1_3
              tls_maximum_protocol_version: TLSv1_3
            tls_certificate_sds_secret_configs:
              - name: portal_tls
            validation_context_sds_secret_config:
              name: portal_ca
            alpn_protocols:
              - h2
{{- end}}

  secrets:
    - name: portal_tls
      tls_certificate:
        certificate_chain:
          filename: {{.CertPath}}/tls.crt
        private_key:
          filename: {{.CertPath}}/tls.key
        watched_directory:
          path: {{.CertPath}}
    - name: portal_ca
      validation_context:
        trusted_ca:
          filename: {{.CertPath}}/ca.crt
        watched_directory:
          path: {{.CertPath}}
