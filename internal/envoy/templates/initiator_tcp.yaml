# Portal initiator (source cluster) Envoy bootstrap — TCP proxy mode.
# mTLS-terminated at Envoy: presents client cert to responder, validates responder cert.
admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: {{.AdminPort}}

static_resources:
  listeners:
    - name: tunnel_initiator
      address:
        socket_address:
          address: 0.0.0.0
          port_value: {{.ListenPort}}
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: tunnel_initiator
                cluster: tunnel_to_responder

  clusters:
    - name: tunnel_to_responder
      connect_timeout: 30s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
      load_assignment:
        cluster_name: tunnel_to_responder
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: {{.ResponderHost}}
                      port_value: {{.ResponderPort}}
      transport_socket:
        name: envoy.transport_sockets.tls
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.UpstreamTlsContext
          sni: {{.SNI}}
          common_tls_context:
            tls_params:
              tls_minimum_protocol_version: TLSv1_3
              tls_maximum_protocol_version: TLSv1_3
            tls_certificate_sds_secret_configs:
              - name: portal_tls
            validation_context_sds_secret_config:
              name: portal_ca
            alpn_protocols:
              - h2

  secrets:
    - name: portal_tls
      tls_certificate:
        certificate_chain:
          filename: {{.CertPath}}/tls.crt
        private_key:
          filename: {{.CertPath}}/tls.key
        watched_directory:
          path: {{.CertPath}}
    - name: portal_ca
      validation_context:
        trusted_ca:
          filename: {{.CertPath}}/ca.crt
        watched_directory:
          path: {{.CertPath}}
