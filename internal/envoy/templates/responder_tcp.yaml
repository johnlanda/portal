# Portal responder (destination cluster) Envoy bootstrap — TCP proxy mode.
# mTLS-terminated at Envoy: requires client certificate from initiator.
admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: {{.AdminPort}}

static_resources:
  listeners:
    - name: tunnel_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: {{.ListenPort}}
      filter_chains:
        - filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: tunnel_responder
                cluster: local_backend
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_3
                tls_certificates:
                  - certificate_chain:
                      filename: {{.CertPath}}/tls.crt
                    private_key:
                      filename: {{.CertPath}}/tls.key
                validation_context:
                  trusted_ca:
                    filename: {{.CertPath}}/ca.crt
                alpn_protocols:
                  - h2

  clusters:
    - name: local_backend
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: local_backend
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: {{.BackendHost}}
                      port_value: {{.BackendPort}}
