# Portal hub (ingress-capable cluster) Envoy bootstrap — reverse tunnel mode.
# One public listener carries both directions, split by SNI: the reverse
# tunnel handshake SNI terminates mTLS into the reverse_tunnel filter chain;
# published forward-service SNIs terminate mTLS into v1-style tcp_proxy
# chains. An egress listener routes hub-originated requests to members over
# cached reverse connections, addressed by canonical authority
# (<service>.<member>).
admin:
  address:
    socket_address:
      address: 127.0.0.1
      port_value: {{.AdminPort}}

bootstrap_extensions:
  - name: envoy.bootstrap.reverse_tunnel.upstream_socket_interface
    typed_config:
      "@type": type.googleapis.com/envoy.extensions.bootstrap.reverse_tunnel.upstream_socket_interface.v3.UpstreamReverseConnectionSocketInterface
      stat_prefix: portal_hub

static_resources:
  listeners:
    - name: tunnel_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: {{.ListenPort}}
      listener_filters:
        - name: envoy.filters.listener.tls_inspector
          typed_config:
            "@type": type.googleapis.com/envoy.extensions.filters.listener.tls_inspector.v3.TlsInspector
      filter_chains:
        # Reverse tunnel handshake chain. Identity is proven, not asserted:
        # the claimed cluster-id must match the peer certificate's DNS SAN.
        - filter_chain_match:
            server_names:
              - "{{.HandshakeSNI}}"
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_3
                tls_certificate_sds_secret_configs:
                  - name: portal_tls
                validation_context_sds_secret_config:
                  name: portal_ca
                alpn_protocols:
                  - h2
                  - http/1.1
          filters:
            - name: envoy.filters.network.reverse_tunnel
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.reverse_tunnel.v3.ReverseTunnel
                ping_interval: {{.PingInterval}}
                validation:
                  cluster_id_format: "%DOWNSTREAM_PEER_DNS_SAN%"
                  emit_dynamic_metadata: true
{{- range .Services}}
        - filter_chain_match:
            server_names:
              - "{{.SNI}}"
          filters:
            - name: envoy.filters.network.tcp_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
                stat_prefix: svc_{{.StatPrefix}}
                cluster: {{.ClusterName}}
          transport_socket:
            name: envoy.transport_sockets.tls
            typed_config:
              "@type": type.googleapis.com/envoy.extensions.transport_sockets.tls.v3.DownstreamTlsContext
              require_client_certificate: true
              common_tls_context:
                tls_params:
                  tls_minimum_protocol_version: TLSv1_3
                tls_certificate_sds_secret_configs:
                  - name: portal_tls
                validation_context_sds_secret_config:
                  name: portal_ca
                alpn_protocols:
                  - h2
{{- end}}

    # Hub-originated requests enter here (fronted by a ClusterIP Service) and
    # are routed to a member's cached reverse connections. The wildcard
    # authority *.<member> selects the member; the original authority is
    # forwarded so the member Envoy matches it against published routes.
    - name: egress
      address:
        socket_address:
          address: 0.0.0.0
          port_value: {{.EgressPort}}
      filter_chains:
        - filters:
            - name: envoy.filters.network.http_connection_manager
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.http_connection_manager.v3.HttpConnectionManager
                stat_prefix: egress
                strip_any_host_port: true
                route_config:
                  name: members
{{- if or .Members .Routes}}
                  virtual_hosts:
{{- range .Members}}
                    - name: member_{{.}}
                      domains:
                        - "*.{{.}}"
                      request_headers_to_add:
                        - header:
                            key: x-portal-member
                            value: "{{.}}"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: reverse_tunnel
{{- end}}
{{- range .Routes}}
                    # Alias authority for {{.Service}}.{{.Member}}; the
                    # authority is rewritten to the canonical form so member
                    # route matching never sees hub-side alias names.
                    - name: alias_{{.Alias}}
                      domains:
                        - "{{.Alias}}"
                        - "{{.Alias}}.*"
                      request_headers_to_add:
                        - header:
                            key: x-portal-member
                            value: "{{.Member}}"
                          append_action: OVERWRITE_IF_EXISTS_OR_ADD
                      routes:
                        - match:
                            prefix: "/"
                          route:
                            cluster: reverse_tunnel
                            host_rewrite_literal: "{{.Service}}.{{.Member}}"
{{- end}}
{{- else}}
                  virtual_hosts: []
{{- end}}
                http_filters:
                  - name: envoy.filters.http.router
                    typed_config:
                      "@type": type.googleapis.com/envoy.extensions.filters.http.router.v3.Router

  clusters:
    # Routes requests over cached reverse connections. host_id selection uses
    # the x-portal-member header injected by the egress virtual hosts — no Lua.
    - name: reverse_tunnel
      connect_timeout: 30s
      lb_policy: CLUSTER_PROVIDED
      cluster_type:
        name: envoy.clusters.reverse_connection
        typed_config:
          "@type": type.googleapis.com/envoy.extensions.clusters.reverse_connection.v3.ReverseConnectionClusterConfig
          cleanup_interval: {{.CleanupInterval}}
          host_id_format: "%REQ(x-portal-member)%"
      typed_extension_protocol_options:
        envoy.extensions.upstreams.http.v3.HttpProtocolOptions:
          "@type": type.googleapis.com/envoy.extensions.upstreams.http.v3.HttpProtocolOptions
          explicit_http_config:
            http2_protocol_options: {}
{{- range .Services}}
    - name: {{.ClusterName}}
      connect_timeout: 5s
      type: STRICT_DNS
      lb_policy: ROUND_ROBIN
      load_assignment:
        cluster_name: {{.ClusterName}}
        endpoints:
          - lb_endpoints:
              - endpoint:
                  address:
                    socket_address:
                      address: {{.BackendHost}}
                      port_value: {{.BackendPort}}
{{- end}}

  secrets:
    - name: portal_tls
      tls_certificate:
        certificate_chain:
          filename: {{.CertPath}}/tls.crt
        private_key:
          filename: {{.CertPath}}/tls.key
        watched_directory:
          path: {{.CertPath}}
    - name: portal_ca
      validation_context:
        trusted_ca:
          filename: {{.CertPath}}/ca.crt
{{- if .EnableCRL}}
        # Member eviction: revoked leaves are listed in the CRL, which Envoy
        # watches and hot-reloads. Blast radius is a single member.
        crl:
          filename: {{.CertPath}}/crl.pem
{{- end}}
        watched_directory:
          path: {{.CertPath}}
